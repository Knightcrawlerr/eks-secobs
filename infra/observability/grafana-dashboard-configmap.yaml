apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-secobs-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"   # kube-prometheus-stack sidecar watches this label
data:
  secobs-overview.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "description": "EKS SecObs — Security Observability Overview",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
    
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }, "id": 100, "title": "Security Posture — Runtime (Falco)", "type": "row" },
    
        {
          "id": 1, "type": "stat", "title": "Falco Alerts (1h)",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "options": { "reduceOptions": { "calcs": ["sum"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] },
              "mappings": [], "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{
            "expr": "sum(increase(falco_events_total[1h]))",
            "legendFormat": "Total", "refId": "A"
          }]
        },
    
        {
          "id": 2, "type": "stat", "title": "Falco Critical Alerts (1h)",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "options": { "reduceOptions": { "calcs": ["sum"] }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{
            "expr": "sum(increase(falco_events_total{priority=\"Critical\"}[1h]))",
            "legendFormat": "Critical", "refId": "A"
          }]
        },
    
        {
          "id": 3, "type": "stat", "title": "Calico Felix Policy Drops (5m)",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{
            "expr": "sum(increase(felix_denied_packets_total[5m]))",
            "legendFormat": "Denied packets", "refId": "A"
          }]
        },
    
        {
          "id": 4, "type": "stat", "title": "Privileged Pods",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{
            "expr": "count(kube_pod_container_info{container_id=~\".+\"}) by (pod) unless on(pod) kube_pod_spec_containers_security_context_run_as_non_root{run_as_non_root=\"true\"} or vector(0)",
            "legendFormat": "Privileged", "refId": "A"
          }]
        },
    
        {
          "id": 5, "type": "timeseries", "title": "Falco Alerts by Priority (rate 5m)",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 5 },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum", "max"] } },
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 10 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Critical" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Error" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Warning" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] }
            ]
          },
          "targets": [
            { "expr": "sum by (priority) (rate(falco_events_total[5m]))", "legendFormat": "{{priority}}", "refId": "A" }
          ]
        },
    
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 }, "id": 101, "title": "GitOps — ArgoCD", "type": "row" },
    
        {
          "id": 10, "type": "stat", "title": "Apps Synced",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 14 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{ "expr": "sum(argocd_app_info{sync_status=\"Synced\"})", "legendFormat": "Synced", "refId": "A" }]
        },
    
        {
          "id": 11, "type": "stat", "title": "Apps Out of Sync",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 14 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{ "expr": "sum(argocd_app_info{sync_status!=\"Synced\"})", "legendFormat": "Out of sync", "refId": "A" }]
        },
    
        {
          "id": 12, "type": "stat", "title": "Degraded Apps",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 14 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{ "expr": "sum(argocd_app_info{health_status=\"Degraded\"})", "legendFormat": "Degraded", "refId": "A" }]
        },
    
        {
          "id": 13, "type": "stat", "title": "Reconciliation Errors (1h)",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 14 },
          "options": { "reduceOptions": { "calcs": ["sum"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{ "expr": "sum(increase(argocd_app_reconcile_count{state=\"error\"}[1h]))", "legendFormat": "Errors", "refId": "A" }]
        },
    
        {
          "id": 14, "type": "table", "title": "App Sync Status",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 18 },
          "options": { "sortBy": [{ "desc": true, "displayName": "sync_status" }] },
          "fieldConfig": { "defaults": { "custom": { "align": "auto" } } },
          "targets": [{
            "expr": "argocd_app_info",
            "legendFormat": "", "refId": "A", "instant": true, "format": "table"
          }],
          "transformations": [
            { "id": "filterFieldsByName", "options": { "include": { "names": ["name", "namespace", "sync_status", "health_status", "dest_server", "dest_namespace"] } } },
            { "id": "organize", "options": { "renameByName": { "name": "App", "namespace": "Namespace", "sync_status": "Sync", "health_status": "Health", "dest_namespace": "Target NS" } } }
          ]
        },
    
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 26 }, "id": 102, "title": "Ingress — Envoy Gateway", "type": "row" },
    
        {
          "id": 20, "type": "stat", "title": "Requests/s",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 27 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "sum(rate(envoy_http_downstream_rq_total[5m]))", "legendFormat": "req/s", "refId": "A" }]
        },
    
        {
          "id": 21, "type": "stat", "title": "5xx Error Rate",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 27 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.01 }, { "color": "red", "value": 0.05 }] },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [{
            "expr": "sum(rate(envoy_http_downstream_rq_xx{http_response_code_class=\"5\"}[5m])) / sum(rate(envoy_http_downstream_rq_total[5m]))",
            "legendFormat": "5xx rate", "refId": "A"
          }]
        },
    
        {
          "id": 22, "type": "stat", "title": "p99 Latency",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 27 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 500 }, { "color": "red", "value": 1000 }] },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [{
            "expr": "histogram_quantile(0.99, sum by (le) (rate(envoy_http_downstream_rq_time_bucket[5m]))) * 1000",
            "legendFormat": "p99", "refId": "A"
          }]
        },
    
        {
          "id": 23, "type": "stat", "title": "Active Downstream CX",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 27 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "sum(envoy_http_downstream_cx_active)", "legendFormat": "connections", "refId": "A" }]
        },
    
        {
          "id": 24, "type": "timeseries", "title": "Envoy Request Rate + Error Rate",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 31 },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 1, "fillOpacity": 8 } } },
          "targets": [
            { "expr": "sum(rate(envoy_http_downstream_rq_total[5m]))", "legendFormat": "total req/s", "refId": "A" },
            { "expr": "sum(rate(envoy_http_downstream_rq_xx{http_response_code_class=\"5\"}[5m]))", "legendFormat": "5xx/s", "refId": "B" },
            { "expr": "sum(rate(envoy_http_downstream_rq_xx{http_response_code_class=\"4\"}[5m]))", "legendFormat": "4xx/s", "refId": "C" }
          ]
        },
    
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 39 }, "id": 103, "title": "Log Pipeline — EFK (Elasticsearch)", "type": "row" },
    
        {
          "id": 30, "type": "stat", "title": "Cluster Health",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 40 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none", "textMode": "value" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "green", "color": "green" }, "1": { "text": "yellow", "color": "yellow" }, "2": { "text": "red", "color": "red" } } }
              ],
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 2 }] }
            }
          },
          "targets": [{ "expr": "elasticsearch_cluster_health_status{color=\"green\"} * 0 + elasticsearch_cluster_health_status{color=\"yellow\"} * 1 + elasticsearch_cluster_health_status{color=\"red\"} * 2", "legendFormat": "Health", "refId": "A" }]
        },
    
        {
          "id": 31, "type": "stat", "title": "Documents Indexed (1h)",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 40 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "sum(increase(elasticsearch_indices_indexing_index_total[1h]))", "legendFormat": "docs/h", "refId": "A" }]
        },
    
        {
          "id": 32, "type": "gauge", "title": "JVM Heap Used %",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 40 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "minVizWidth": 75, "showThresholdLabels": false },
          "fieldConfig": {
            "defaults": {
              "unit": "percent", "min": 0, "max": 100,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 85 }] },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [{
            "expr": "elasticsearch_jvm_memory_used_bytes{area=\"heap\"} / elasticsearch_jvm_memory_max_bytes{area=\"heap\"} * 100",
            "legendFormat": "Heap %", "refId": "A"
          }]
        },
    
        {
          "id": 33, "type": "stat", "title": "Active Shards",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 40 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "none" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "elasticsearch_cluster_health_active_shards", "legendFormat": "Active shards", "refId": "A" }]
        },
    
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 44 }, "id": 104, "title": "Secret Management — ESO", "type": "row" },
    
        {
          "id": 40, "type": "stat", "title": "ExternalSecrets Ready",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 45 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{ "expr": "sum(externalsecret_status_condition{type=\"Ready\",status=\"True\"})", "legendFormat": "Ready", "refId": "A" }]
        },
    
        {
          "id": 41, "type": "stat", "title": "Sync Errors (1h)",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 45 },
          "options": { "reduceOptions": { "calcs": ["sum"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{ "expr": "sum(increase(controller_runtime_reconcile_errors_total{controller=\"externalsecret\"}[1h]))", "legendFormat": "Errors", "refId": "A" }]
        },
    
        {
          "id": 42, "type": "stat", "title": "Reconcile Rate (5m)",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 45 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "ops", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "sum(rate(controller_runtime_reconcile_total{controller=\"externalsecret\"}[5m]))", "legendFormat": "ops/s", "refId": "A" }]
        },
    
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 49 }, "id": 105, "title": "Network Enforcement — Calico Felix", "type": "row" },
    
        {
          "id": 50, "type": "timeseries", "title": "Felix Policy Drops by Namespace (rate 5m)",
          "gridPos": { "h": 8, "w": 16, "x": 0, "y": 50 },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "right", "calcs": ["sum", "max"] } },
          "fieldConfig": { "defaults": { "unit": "pps", "custom": { "lineWidth": 1, "fillOpacity": 10 } } },
          "targets": [{
            "expr": "sum by (namespace) (rate(felix_denied_packets_total[5m]))",
            "legendFormat": "{{namespace}}", "refId": "A"
          }]
        },
    
        {
          "id": 51, "type": "stat", "title": "Felix Instances Active",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 50 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 5 }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{ "expr": "count(felix_cluster_num_hosts)", "legendFormat": "Nodes", "refId": "A" }]
        },
    
        {
          "id": 52, "type": "stat", "title": "Active NetworkPolicies",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 54 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "none" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "sum(felix_active_local_policies)", "legendFormat": "Policies", "refId": "A" }]
        },
    
        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 58 }, "id": 106, "title": "Load Balancer — MetalLB", "type": "row" },
    
        {
          "id": 60, "type": "stat", "title": "Allocated IPs",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 59 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "none" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "sum(metallb_allocator_addresses_in_use_total)", "legendFormat": "In use", "refId": "A" }]
        },
    
        {
          "id": 61, "type": "stat", "title": "Available IPs",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 59 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "none" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "sum(metallb_allocator_addresses_total) - sum(metallb_allocator_addresses_in_use_total)", "legendFormat": "Available", "refId": "A" }]
        },
    
        {
          "id": 62, "type": "stat", "title": "Speaker Config Stale Alerts",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 59 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] },
              "unit": "short", "color": { "mode": "thresholds" }
            }
          },
          "targets": [{ "expr": "sum(metallb_speaker_announced{state=\"announce\"}) or vector(0)", "legendFormat": "Announced", "refId": "A" }]
        }
    
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["security", "devsecops", "eks-secobs"],
      "templating": {
        "list": [
          {
            "current": {}, "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(kube_pod_info, namespace)",
            "hide": 0, "includeAll": true, "multi": true,
            "name": "namespace", "label": "Namespace",
            "options": [], "query": { "query": "label_values(kube_pod_info, namespace)", "refId": "StandardVariableQuery" },
            "refresh": 2, "sort": 1, "type": "query"
          },
          {
            "current": {}, "hide": 0, "includeAll": false,
            "name": "datasource", "label": "Datasource",
            "options": [], "query": "prometheus",
            "refresh": 1, "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-3h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "EKS SecObs — Security Overview",
      "uid": "eks-secobs-overview",
      "version": 1
    }