apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: kind-secrets-store
spec:
  provider:
    kubernetes:
      remoteNamespace: secrets  # ESO reads from this namespace
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: secrets
      auth:
        serviceAccount:
          name: eso-secrets-reader
          namespace: secrets