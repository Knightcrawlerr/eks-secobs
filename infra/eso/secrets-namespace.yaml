apiVersion: v1
kind: Namespace
metadata:
  name: secrets
---
# ESO uses this SA to read secrets from the secrets namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secrets-reader
  namespace: secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-secrets-reader
  namespace: secrets
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]  # needed for kube-root-ca.crt
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-secrets-reader
  namespace: secrets
subjects:
  - kind: ServiceAccount
    name: eso-secrets-reader
    namespace: secrets
roleRef:
  kind: Role
  name: eso-secrets-reader
  apiGroup: rbac.authorization.k8s.io