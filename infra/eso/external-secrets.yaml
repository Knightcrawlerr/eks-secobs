# Syncs Elasticsearch password into falco-system
# Source: secrets/elasticsearch-elastic-password
# Target: falco-system/elasticsearch-elastic-password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: elasticsearch-elastic-password
  namespace: falco-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kind-secrets-store
    kind: ClusterSecretStore
  target:
    name: elasticsearch-elastic-password  # name of the native secret ESO creates
    creationPolicy: Owner                 # ESO owns this secret — deletes it if ExternalSecret is deleted
  data:
    - secretKey: elastic                  # key in the created secret
      remoteRef:
        key: elasticsearch-elastic-password  # secret name in secrets ns
        property: elastic                    # key within that secret
---
# Syncs TLS cert into envoy-gateway-system
# Source: secrets/juice-shop-tls
# Target: envoy-gateway-system/juice-shop-tls
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: juice-shop-tls
  namespace: envoy-gateway-system
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: kind-secrets-store
    kind: ClusterSecretStore
  target:
    name: juice-shop-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls  # preserves TLS secret type
  data:
    - secretKey: tls.crt
      remoteRef:
        key: juice-shop-tls
        property: tls.crt
    - secretKey: tls.key
      remoteRef:
        key: juice-shop-tls
        property: tls.key