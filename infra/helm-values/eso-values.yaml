installCRDs: false  

replicaCount: 1

nodeSelector:
  node-role: platform

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

webhook:
  nodeSelector:
    node-role: platform

certController:
  nodeSelector:
    node-role: platform
  
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s
  additionalLabels:
    release: monitoring