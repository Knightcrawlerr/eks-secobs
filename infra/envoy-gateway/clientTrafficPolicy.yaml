apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: client-traffic-policy
  namespace: envoy-gateway-system       # targets the Gateway, lives where Gateway lives
  labels:
    app.kubernetes.io/name: envoy-gateway
    app.kubernetes.io/component: gateway-infrastructure
    app.kubernetes.io/managed-by: kubectl
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    name: eg
    kind: Gateway
    sectionName: https
  path:
    disableMergeSlashes: true
    escapedSlashesAction: KeepUnchanged