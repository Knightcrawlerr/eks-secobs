apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: argocd-backend-tls
  namespace: argocd
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: argocd-server
      sectionName: "https"
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: argocd-ca
    hostname: argocd.juice-shop.com