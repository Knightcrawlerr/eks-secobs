apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: kibana-backend-tls
  namespace: logging
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: kibana-kb-http
      sectionName: "https"
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: kibana-ca
    hostname: kibana-kb-http.logging.kb.local
        