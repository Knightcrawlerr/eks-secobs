replicaCount: 2
namespace: juice-shop

image:
  repository: ghcr.io/knightcrawlerr/juice-shop@sha256:9e68aa58eb7321f794798eb33d7200462d9965b9de3e0cce45c7ef8dd7b8ea25
  pullPolicy: Always
  tag: "sha-c4ed789af0ce4aa152a818e34c0a6e2ba7f84dbb"

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 3000

networkPolicy:
  enabled: true

app:
  gateway:
    name: eg
    host: juice-shop.com
    namespace: envoy-gateway-system

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
