apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "juice-shop.fullname" . }}-argocd-httproute
  namespace: {{ .Values.argocd.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "juice-shop.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
    parentRefs:
      - name: {{ .Values.app.gateway.name }}
        namespace: {{ .Values.app.gateway.namespace }}
        sectionName: https
    hostnames:
        - {{.Values.argocd.host}}
    rules:
        - backendRefs:
            - kind: Service
              name: argocd-server
              port: 80
              weight: 1
          matches:
            - path:
                type: PathPrefix
                value: /