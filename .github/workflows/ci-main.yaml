name: eks-secobs-ci-main
on:
  push:
    branches:
      - main
    paths-ignore:
        - "*.md"
        - "LICENSE"

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Gitleaks - Secret Detection
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  iac-scan:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Checkov - IaC Security Scanning
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: .
          framework: terraform,helm,kubernetes
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: false

      - name: Upload Checkov SARIF results to Github Security
        uses: github/codeql-action/upload-sarif@v4 
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov-iac

      - name: Upload Checkov results to S3
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}  
        run: |
          aws s3 cp checkov-results.sarif s3://${{ vars.S3_BUCKET_NAME }}/checkov/$(date +%Y-%m-%d)/${{ github.sha }}.sarif

  manifest-scan:
    runs-on: ubuntu-latest
    needs: iac-scan
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Trivy — Kubernetes manifest scan
        uses: aquasecurity/trivy-action@v0.36.0 
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-manifest.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
    
      - name: Upload Trivy SARIF results to Github Security
        uses: github/codeql-action/upload-sarif@v4 
        if: always()
        with:
          sarif_file: trivy-manifest.sarif
          category: trivy-manifests

      - name: Upload Trivy results to S3
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws s3 cp trivy-manifest.sarif s3://${{ vars.S3_BUCKET_NAME }}/trivy-fs/$(date +%Y-%m-%d)/${{ github.sha }}.sarif
